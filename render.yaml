services:
  - type: web
    name: nextcareer-ai
    env: python
    buildCommand: pip install -r requirements.txt && python generate_data.py && python src/model_training.py
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: GEMINI_API_KEY
        sync: false # Set your Gemini API key in the Render Dashboard
